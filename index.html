      { id: 2, nisn: "0012345679", name: "Siti Aminah", kelas: "IX B", status: "LULUS" },

      { id: 4, nisn: "0012345681", name: "Rina Melati", kelas: "IX A", status: "LULUS" },

    // --- DEKLARASI KOMPONEN HELPER DI LUAR APP AGAR TIDAK RE-MOUNT (MENGATASI BUG FOCUS FORM) ---
    
    const Toast = ({ toast }) => {
      if (!toast.show) return null;
      return (
        <div className={`fixed bottom-5 right-5 z-[100] flex items-center p-4 rounded-xl shadow-2xl animate-bounce-short ${toast.type === 'success' ? 'bg-brand-600' : 'bg-red-600'} text-white`}>

    const Countdown = ({ isSystemActive, ANNOUNCEMENT_DATE }) => {
      const [t, setT] = useState({ d: 0, h: 0, m: 0, s: 0 });
      const [isFinished, setIsFinished] = useState(false);

      useEffect(() => {
        const timer = setInterval(() => {
          const dist = ANNOUNCEMENT_DATE - new Date().getTime();
          if (dist < 0) {
            setIsFinished(true);
            return clearInterval(timer);
          }
          setT({
            d: Math.floor(dist / 86400000), h: Math.floor((dist % 86400000) / 3600000),
            m: Math.floor((dist % 3600000) / 60000), s: Math.floor((dist % 60000) / 1000)
          });
        }, 1000);
        return () => clearInterval(timer);
      }, [ANNOUNCEMENT_DATE]);

      if (isFinished || isSystemActive) {
        return (
          <div className="my-10 bg-brand-600/10 dark:bg-brand-600/20 border border-brand-500/30 text-brand-600 dark:text-brand-300 px-6 py-3 rounded-2xl animate-pulse font-black uppercase text-sm tracking-widest no-print">
            🎉 PENGUMUMAN SUDAH DIMULAI & DAPAT DIAKSES 🎉
          </div>
        );
      }

      return (
        <div className="flex justify-center space-x-3 md:space-x-4 my-10 no-print">
          {[ {l:'Hari',v:t.d}, {l:'Jam',v:t.h}, {l:'Menit',v:t.m}, {l:'Detik',v:t.s} ].map((x,i)=>(

              </div>

            </div>
          ))}
        </div>
      );
    };

    const HomePage = ({ setCurrentPath, isSystemActive, ANNOUNCEMENT_DATE }) => (

        {/* Background decorative blur circles */}
        <div className="absolute top-10 left-10 w-72 h-72 bg-brand-800/5 dark:bg-brand-800/10 rounded-full filter blur-[80px] pointer-events-none"></div>
        <div className="absolute bottom-10 right-10 w-72 h-72 bg-brand-600/5 dark:bg-brand-600/10 rounded-full filter blur-[80px] pointer-events-none"></div>

        </div>

        <div className="mt-8 w-full max-w-3xl relative z-10 animate-fade-in-up">

            </div>
          )}

            <div className="bg-white dark:bg-brand-900/30 backdrop-blur-md p-8 rounded-3xl border border-slate-200 dark:border-brand-700/50 text-center shadow-lg">

      const handleDownloadTemplate = () => {
        const csvContent = "data:text/csv;charset=utf-8,nisn,name,kelas,status\n0012345683,Ahmad Faisal,IX D,LULUS\n0012345684,Siti Rahma,IX C,TIDAK LULUS\n0012345685,Rian Hidayat,IX B,DITUNDA";
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Template_Kelulusan_SMPN42.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('Template CSV berhasil diunduh', 'success');
      };

      // 👉 FUNGSI IMPOR / UNGGAH CSV MASSAL DENGAN PARSER DETEKSI PEMISAH (KOMA ATAU TITIK KOMA)
      const handleUploadCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          const text = evt.target.result;
          const lines = text.split("\n").map(l => l.trim()).filter(l => l !== "");
          
          if (lines.length <= 1) {
            showToast("File CSV kosong atau hanya berisi baris judul", "error");
            return;
          }

          // Otomatis deteksi separator koma (,) atau titik koma (;) khas Excel Indonesia
          const separator = lines[1].includes(';') ? ';' : ',';
          const newStudents = [];

          for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(separator);
            if (cols.length < 4) continue;

            const student = {
              id: Date.now() + i,
              nisn: cols[0]?.replace(/["']/g, '').trim(),
              name: cols[1]?.replace(/["']/g, '').trim(),
              kelas: cols[2]?.replace(/["']/g, '').trim(),
              status: cols[3]?.replace(/["']/g, '').trim().toUpperCase()
            };

            // Validasi data dasar agar tidak rusak saat diimpor
            if (student.nisn && student.name && student.kelas && ['LULUS', 'TIDAK LULUS', 'DITUNDA'].includes(student.status)) {
              newStudents.push(student);
            }
          }

          if (newStudents.length > 0) {
            setStudentsData(prev => {
              // Hindari penimpaan duplikasi NISN yang sudah ada sebelumnya
              const existingNisns = new Set(prev.map(s => s.nisn));
              const filteredNew = newStudents.filter(s => !existingNisns.has(s.nisn));
              return [...prev, ...filteredNew];
            });
            showToast(`Berhasil menambahkan ${newStudents.length} data siswa secara massal!`, 'success');
          } else {
            showToast("Gagal mengimpor. Format isi CSV tidak valid/salah.", "error");
          }
        };

        reader.readAsText(file);
        // Reset file input agar bisa mendeteksi file yang sama kembali jika diunggah ulang
        e.target.value = '';
      };

                    </div>
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 dark:text-brand-400 uppercase">Kelas</label>
                      <input name="kelas" defaultValue={editingStudent.kelas} className="w-full p-3 rounded-xl border-2 bg-slate-50 dark:bg-brand-950/80 border-slate-200 dark:border-brand-800 text-slate-800 dark:text-white mt-1 focus:border-brand-500 outline-none" required />
                    </div>

                  <div>
                    <label className="text-[10px] font-bold text-slate-400 dark:text-brand-400 uppercase">Status Kelulusan</label>
                    <select name="status" defaultValue={editingStudent.status} className="w-full p-3 rounded-xl border-2 bg-slate-50 dark:bg-brand-950/80 border-slate-200 dark:border-brand-800 text-slate-800 dark:text-white mt-1 font-bold focus:border-brand-500 outline-none">
                      <option value="LULUS">LULUS</option>
                      <option value="TIDAK LULUS">TIDAK LULUS</option>
                      <option value="DITUNDA">DITUNDA</option>
                    </select>
                  </div>
                  <div className="flex gap-2 pt-4">
                    <button type="button" onClick={() => setEditingStudent(null)} className="flex-1 py-3 text-slate-500 font-bold hover:bg-slate-100 dark:hover:bg-brand-950 rounded-xl transition-all border border-slate-200 dark:border-brand-800">BATAL</button>
                    <button type="submit" className="flex-1 py-3 bg-brand-600 text-white font-bold rounded-xl hover:bg-brand-500 shadow-lg shadow-brand-500/30 transition-all">SIMPAN PERUBAHAN</button>

          )}

          {/* MODAL HAPUS */}
          {deletingStudent && (

    // --- MAIN REACT COMPONENT ---
    function App() {
      const [currentPath, setCurrentPath] = useState('home');
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [isFullscreen, setIsFullscreen] = useState(false);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [musicPlaying, setMusicPlaying] = useState(false);
      
      const [searchQuery, setSearchQuery] = useState('');
      const [searchResult, setSearchResult] = useState(null); 
      
      const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
      const [adminPin, setAdminPin] = useState('');
      const [studentsData, setStudentsData] = useState(INITIAL_STUDENTS);
      const [isLoadingData, setIsLoadingData] = useState(false);

      // 👉 TOMBOL AKTIF & NON-AKTIF AKSES SISTEM (Disimpan di localStorage)
      const [isSystemActive, setIsSystemActive] = useState(() => {
        return localStorage.getItem('isSystemActive') === 'true';
      });

      // --- MODAL STATES ---
      const [editingStudent, setEditingStudent] = useState(null);
      const [deletingStudent, setDeletingStudent] = useState(null);

      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

      const audioRef = useRef(null);
      const fileInputRef = useRef(null);
      const hasAutoSearched = useRef(false);

      // 👉 PERSISTENSI STATUS SISTEM AKTIF/NON-AKTIF
      useEffect(() => {
        localStorage.setItem('isSystemActive', isSystemActive);
      }, [isSystemActive]);

      // 👉 FETCH DATA AWAL
      useEffect(() => {
        if (GAS_URL) {
          setIsLoadingData(true);
          fetch(`${GAS_URL}?action=getData`)
            .then(res => res.json())
            .then(res => {
              if (res.status === 'success' && res.data) {
                const formattedData = res.data.map((item, index) => ({
                  id: item.id || Date.now() + index,
                  ...item
                }));
                // Pastikan NISN 12345 tetap ada walaupun mengambil data dari Spreadsheet
                const updatedData = [...formattedData];
                if (!updatedData.some(s => s.nisn === "12345")) {
                  updatedData.push({ id: 99999, nisn: "12345", name: "Siswa Uji Coba Sistem", kelas: "IX Admin", status: "LULUS" });
                }
                setStudentsData(updatedData);
                showToast('Data berhasil dimuat', 'success');
              }
            })
            .catch(() => showToast('Gagal memuat database', 'error'))
            .finally(() => setIsLoadingData(false));
        }
      }, []);

      // 👉 AUTO-SEARCH DARI QR DENGAN CHECK STATUS WAKTU & STATUS SAKELAR SISTEM
      useEffect(() => {
        if (hasAutoSearched.current || isLoadingData || studentsData.length === 0) return;
        const params = new URLSearchParams(window.location.search);
        const nisnParam = params.get('nisn');
        if (nisnParam) {
          hasAutoSearched.current = true;
          
          // Sistem dianggap rilis apabila waktu sudah lewat atau admin menyalakan sakelar "Aktif"
          const now = new Date().getTime();
          const isReleased = now >= ANNOUNCEMENT_DATE || isSystemActive;

          if (!isReleased && nisnParam !== '12345') {
            showToast('Pengumuman Belum Dimulai!', 'error');
            setCurrentPath('cek');
            return;
          }

          setSearchQuery(nisnParam);
          setCurrentPath('cek');
          setSearchResult('loading');
          setTimeout(() => {
            const result = studentsData.find(s => s.nisn === nisnParam);
            setSearchResult(result || 'not_found');
          }, 800);
        }
      }, [studentsData, isLoadingData, isSystemActive]);

      useEffect(() => {
        if (isDarkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [isDarkMode]);

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
      };

      // 👉 PERBAIKAN ERROR LAYAR PENUH
      const toggleFullscreen = () => {
        try {
          if (!document.fullscreenEnabled) {
            showToast('Layar penuh dibatasi oleh kebijakan keamanan browser', 'error');
            return;
          }
          if (!document.fullscreenElement) {
            const req = document.documentElement.requestFullscreen();
            if (req && typeof req.catch === 'function') {
              req.then(() => setIsFullscreen(true))
                 .catch(() => {
                   showToast('Gagal mengaktifkan layar penuh', 'error');
                   setIsFullscreen(false);
                 });
            } else {
              setIsFullscreen(true);
            }
          } else {
            const exit = document.exitFullscreen();
            if (exit && typeof exit.catch === 'function') {
              exit.then(() => setIsFullscreen(false))
                  .catch(() => {
                    setIsFullscreen(false);
                  });
            } else {
              setIsFullscreen(false);
            }
          }
        } catch (error) {
          showToast('Fitur layar penuh tidak didukung di lingkungan ini', 'error');
          setIsFullscreen(false);
        }
      };

      const toggleMusic = () => {
        if (musicPlaying) audioRef.current?.pause();
        else audioRef.current?.play().catch(() => {});
        setMusicPlaying(!musicPlaying);
      };

      // 👉 VALIDASI WAKTU PENGUMUMAN & BYPASS SAKELAR AKTIF & BYPASS "12345"
      const handleSearch = (e) => {
        e.preventDefault();
        if (!searchQuery.trim()) return showToast('Masukkan NISN', 'error');

        const now = new Date().getTime();
        const isReleased = now >= ANNOUNCEMENT_DATE || isSystemActive;

        // Proteksi countdown waktu rilis, bypass jika sakelar Aktif ATAU NISN adalah '12345'
        if (!isReleased && searchQuery !== '12345') {
          showToast('Pengumuman Belum Dimulai!', 'error');
          setSearchResult('not_started');
          return;
        }

        setSearchResult('loading');
        setTimeout(() => {
          const result = studentsData.find(s => s.nisn === searchQuery);
          setSearchResult(result || 'not_found');
          if (result) showToast('Data ditemukan', 'success');
        }, 800);
      };

      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (adminPin === 'admin1') {
          setIsAdminLoggedIn(true);
          showToast('Login Berhasil', 'success');
        } else showToast('PIN Salah', 'error');
      };

      // --- AKSI DATA ---
      const deleteStudent = () => {
        if (!deletingStudent) return;
        setStudentsData(prev => prev.filter(s => s.id !== deletingStudent.id));
        showToast(`Data ${deletingStudent.name} berhasil dihapus`, 'success');
        setDeletingStudent(null);
      };

      const updateStudent = (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const updated = {
          ...editingStudent,
          name: formData.get('name'),
          nisn: formData.get('nisn'),
          kelas: formData.get('kelas'),
          status: formData.get('status')
        };
        setStudentsData(prev => prev.map(s => s.id === updated.id ? updated : s));
        showToast('Data berhasil diperbarui', 'success');
        setEditingStudent(null);
      };

      const downloadQR = (nisn) => {
        const baseUrl = window.location.origin + window.location.pathname;
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(baseUrl + '?nisn=' + nisn)}`;
        fetch(qrUrl).then(res => res.blob()).then(blob => {
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `QR_${nisn}.png`;
          a.click();
        });
      };

      return (
        <div className="bg-brand-50 dark:bg-brand-950 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col justify-between transition-colors duration-300">
          <audio ref={audioRef} loop src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=ambient-piano-amp-strings-10711.mp3" />
          <Toast toast={toast} />
          <Navbar 
            currentPath={currentPath} 
            setCurrentPath={setCurrentPath} 
            isDarkMode={isDarkMode} 
            setIsDarkMode={setIsDarkMode} 
            toggleMusic={toggleMusic} 
            musicPlaying={musicPlaying} 
            toggleFullscreen={toggleFullscreen} 
            isMobileMenuOpen={isMobileMenuOpen} 
            setIsMobileMenuOpen={setIsMobileMenuOpen} 
          />
          <main className="flex-grow">
            {currentPath === 'home' && (
              <HomePage 
                setCurrentPath={setCurrentPath} 
                isSystemActive={isSystemActive} 
                ANNOUNCEMENT_DATE={ANNOUNCEMENT_DATE} 
              />
            )}
            {currentPath === 'cek' && (
              <CekKelulusanPage 
                handleSearch={handleSearch} 
                searchQuery={searchQuery} 
                setSearchQuery={setSearchQuery} 
                searchResult={searchResult} 
                downloadQR={downloadQR} 
              />
            )}
            {currentPath === 'admin' && (
              <AdminPage 
                isAdminLoggedIn={isAdminLoggedIn} 
                setIsAdminLoggedIn={setIsAdminLoggedIn}
                handleAdminLogin={handleAdminLogin} 
                adminPin={adminPin} 
                setAdminPin={setAdminPin} 
                studentsData={studentsData} 
                setStudentsData={setStudentsData}
                isSystemActive={isSystemActive} 
                setIsSystemActive={setIsSystemActive}
                editingStudent={editingStudent}
                setEditingStudent={setEditingStudent}
                deletingStudent={deletingStudent}
                setDeletingStudent={setDeletingStudent}
                updateStudent={updateStudent}
                deleteStudent={deleteStudent}
                showToast={showToast}
              />
            )}
          </main>
          <footer className="p-8 bg-brand-50 dark:bg-brand-950 text-brand-700 dark:text-brand-400 text-[10px] text-center border-t border-brand-200 dark:border-brand-900 no-print uppercase tracking-widest font-medium footer-text transition-colors duration-300">
            © 2026 SMP Negeri 42 Bandar Lampung • Official Studiolpg Creative
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
